<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Timer Settings</title>
  <link rel="stylesheet" href="settings.css"/>
</head>
<body>

  <div class="settings-container">

    <div class="settings-header">
      <span class="header-icon">⚙</span>
      <h1>Timer Settings</h1>
    </div>

   

    <!-- DURATION -->
    <div class="section">
      <label class="section-title">Duration</label>
      <div class="preset-grid">
        <button class="preset-btn" onclick="setDuration(5)">5s</button>
        <button class="preset-btn" onclick="setDuration(10)">10s</button>
        <button class="preset-btn" onclick="setDuration(15)">15s</button>
        <button class="preset-btn" onclick="setDuration(30)">30s</button>
        <button class="preset-btn" onclick="setDuration(45)">45s</button>
        <button class="preset-btn" onclick="setDuration(60)">1m</button>
        <button class="preset-btn" onclick="setDuration(90)">1m 30s</button>
        <button class="preset-btn" onclick="setDuration(120)">2m</button>
        <button class="preset-btn" onclick="setDuration(180)">3m</button>
        <button class="preset-btn" onclick="setDuration(300)">5m</button>
        <button class="preset-btn" onclick="setDuration(600)">10m</button>
        <button class="preset-btn" onclick="setDuration(900)">15m</button>
      </div>
      <div class="custom-duration">
        <label>Custom (seconds):</label>
        <input type="number" id="custom-seconds" min="1" max="7200" placeholder="e.g. 240"/>
        <button class="apply-btn" onclick="applyCustom()">Apply</button>
      </div>
      <div id="duration-display" class="duration-display">Selected: 60s</div>
    </div>

    <!-- SOUND -->
    <div class="section">
      <label class="section-title">Sound Alert</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="sound-on" onclick="setSound(true)">
          🔔 On
        </button>
        <button class="toggle-btn" id="sound-off" onclick="setSound(false)">
          🔕 Off
        </button>
      </div>
    </div>

    <!-- ZONE LABELS -->
    <div class="section">
      <label class="section-title">Zone Labels</label>
      <p class="section-hint">Shown on timer as time decreases ↓</p>
      <div class="zone-list">
        <div class="zone-row">
          <span class="zone-dot" style="background:#27ae60"></span>
          <span class="zone-pct">75–100%</span>
          <input type="text" id="zone-0" class="zone-input" maxlength="20" placeholder="e.g. Exam Topper"/>
        </div>
        <div class="zone-row">
          <span class="zone-dot" style="background:#f39c12"></span>
          <span class="zone-pct">50–75%</span>
          <input type="text" id="zone-1" class="zone-input" maxlength="20" placeholder="e.g. Exam Qualifier"/>
        </div>
        <div class="zone-row">
          <span class="zone-dot" style="background:#e67e22"></span>
          <span class="zone-pct">25–50%</span>
          <input type="text" id="zone-2" class="zone-input" maxlength="20" placeholder="e.g. 50-50 Chance"/>
        </div>
        <div class="zone-row">
          <span class="zone-dot" style="background:#e74c3c"></span>
          <span class="zone-pct">0–25%</span>
          <input type="text" id="zone-3" class="zone-input" maxlength="20" placeholder="e.g. Need To Improve"/>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn-cancel" onclick="cancel()">Cancel</button>
      <button class="btn-save" onclick="save()">Save & Apply</button>
    </div>

  </div>

  <script src="settings.js"></script>
</body>
</html>
