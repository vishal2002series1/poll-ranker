<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poll Ranker — Setup</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="settings-container">

    <div class="settings-header">
      <span class="header-icon">📊</span>
      <h1>Poll Ranker — Setup</h1>
    </div>

    <!-- LICENSE -->
    <div class="section">
      <label class="section-title">Subscription</label>
      <p class="section-hint">Enter your license key to activate Poll Ranker.</p>
      <div class="custom-duration">
        <input type="text" id="license-key" placeholder="e.g. PRO-2026-TEACHER" style="flex:1; width:auto;" />
        <button class="apply-btn" onclick="checkLicense()">Activate</button>
      </div>
      <div id="license-status" class="duration-display"></div>
    </div>

    <!-- STREAM URL -->
    <div class="section">
      <label class="section-title">YouTube Live Stream</label>
      <p class="section-hint">Paste the URL of your live stream (watch, youtu.be, or /live link).</p>
      <input type="text" id="stream-url" class="zone-input" style="width:100%;"
             placeholder="https://www.youtube.com/watch?v=..." />
    </div>

    <!-- BUFFER OFFSET -->
    <div class="section">
      <label class="section-title">Latency Buffer</label>
      <p class="section-hint">Compensate for YouTube broadcast delay. Subtracted from each vote's response time.</p>
      <div class="custom-duration">
        <label>Offset (seconds):</label>
        <input type="number" id="buffer-offset" min="0" max="120" step="0.5" placeholder="0" />
      </div>
    </div>

    <!-- DEFAULT POLL -->
    <div class="section">
      <label class="section-title">Default Poll</label>
      <p class="section-hint">Pre-selected when you open a new poll.</p>
      <div class="preset-grid" style="grid-template-columns: repeat(3, 1fr);">
        <button class="preset-btn" data-dur="30" onclick="setDuration(30)">30s</button>
        <button class="preset-btn" data-dur="45" onclick="setDuration(45)">45s</button>
        <button class="preset-btn" data-dur="60" onclick="setDuration(60)">60s</button>
      </div>
      <div class="toggle-group" style="margin-top:8px;">
        <button class="toggle-btn" id="opt-4" onclick="setOptions(4)">4 Options (A–D)</button>
        <button class="toggle-btn" id="opt-5" onclick="setOptions(5)">5 Options (A–E)</button>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn-cancel" onclick="cancel()">Cancel</button>
      <button class="btn-save" onclick="save()">Save</button>
    </div>

  </div>

  <script src="settings.js"></script>
</body>
</html>
