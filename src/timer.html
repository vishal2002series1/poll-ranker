<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Classroom Timer</title>
  <link rel="stylesheet" href="timer.css"/>
</head>
<body>

  <!-- CIRCULAR MODE -->
  <div id="circular-widget">
    <canvas id="dial" width="320" height="300"></canvas>
    <div id="center-display">
      <div id="time-display">00:00</div>
    </div>
    <div id="controls">
      <button id="btn-mode" title="Switch Mode">⇄</button>
      <button id="btn-start">▶</button>
      <button id="btn-pause">⏸</button>
      <button id="btn-reset">↺</button>
      <button id="btn-font-down" title="Decrease label size" class="font-btn">A−</button>
      <button id="btn-font-up"   title="Increase label size" class="font-btn">A+</button>
      <button id="btn-gear">⚙</button>
      <button id="btn-exit" title="Exit">✕</button>
    </div>
    <div id="resize-grip" title="Drag to resize">⤡</div>
  </div>

  <!-- BAR MODE -->
  <div id="bar-widget" class="hidden">
    <div id="bar-strip">
      <div id="bar-segments"></div>
      <div id="bar-marker"></div>
      <div id="bar-time-overlay"></div>
      <div id="bar-resize-grip" title="Drag to resize height">⠿</div>
    </div>
    <div id="bar-controls">
      <button id="bar-btn-mode" title="Switch Mode">⇄</button>
      <button id="bar-btn-start">▶</button>
      <button id="bar-btn-pause">⏸</button>
      <button id="bar-btn-reset">↺</button>
      <button id="bar-btn-font-down" title="Decrease label size" class="font-btn">A−</button>
      <button id="bar-btn-font-up"   title="Increase label size" class="font-btn">A+</button>
      <button id="bar-btn-gear">⚙</button>
      <button id="bar-btn-exit" title="Exit">✕</button>
    </div>
  </div>

  <!-- VERTICAL MODE -->
  <div id="vertical-widget" class="hidden">
    <div id="vertical-strip">
      <div id="vertical-segments"></div>
      <div id="vertical-marker"></div>
      <div id="vertical-time-overlay"></div>
      <div id="vertical-resize-grip" title="Drag to resize width">⠿</div>
    </div>
    <div id="vertical-controls">
      <button id="vert-btn-mode" title="Switch Mode">⇄</button>
      <button id="vert-btn-start">▶</button>
      <button id="vert-btn-pause">⏸</button>
      <button id="vert-btn-reset">↺</button>
      <button id="vert-btn-font-down" title="Decrease label size" class="font-btn">A−</button>
      <button id="vert-btn-font-up"   title="Increase label size" class="font-btn">A+</button>
      <button id="vert-btn-gear">⚙</button>
      <button id="vert-btn-exit" title="Exit">✕</button>
    </div>
  </div>

  <script src="timer.js"></script>
</body>
</html>
